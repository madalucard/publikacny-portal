<div
  class="card post-card"
  [class.selected]="selected()"
  (click)="select()"
  (keydown.enter)="select()"
  (keydown.space)="select()"
  tabindex="0"
  role="button"
>
  <div class="card-body p-3">
    <h5 class="card-title">{{ post().title }}</h5>
    <p class="author-line"><i class="bi bi-person-fill"></i>{{ post().authorName }}</p>
    <p class="card-text">{{ post().body | truncate }}</p>
  </div>
  <div class="card-footer text-end">
    <span class="read-badge"> Čítať <i class="bi bi-arrow-right"></i> </span>
  </div>
</div>
